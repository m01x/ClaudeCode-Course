<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle">
      <span class="toggle-icon">&#9790;</span>
      <span class="toggle-label">LIGHT</span>
    </button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">BEST</span>
          <span class="value best-value" id="best-score">-</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="panel-section">
          <span class="label">COMBO</span>
          <span class="value combo-value" id="combo">-</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section skin-selector">
          <span class="label">SKIN</span>
          <div class="skin-buttons">
            <button class="skin-btn active" data-skin="retro">Retro</button>
            <button class="skin-btn" data-skin="neon">Neon</button>
            <button class="skin-btn" data-skin="pastel">Pastel</button>
            <button class="skin-btn" data-skin="pixel">Pixel</button>
          </div>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">

        <!-- Pantalla de inicio -->
        <div id="screen-start" class="screen hidden">
          <p class="screen-title title-blue">TETRIS</p>
          <div id="records-start" class="records-container"></div>
          <button id="start-btn" class="btn-primary">INICIAR JUEGO</button>
          <button id="reset-btn-start" class="btn-reset">Borrar récords</button>
        </div>

        <!-- Pantalla de game over -->
        <div id="screen-gameover" class="screen hidden">
          <p class="screen-title title-red">GAME OVER</p>
          <p id="gameover-stats" class="gameover-stats"></p>
          <div id="new-record-section" class="new-record-section hidden">
            <p class="new-record-badge">¡NUEVO RÉCORD!</p>
            <div class="name-row">
              <input id="player-name" type="text" class="name-input" maxlength="12"
                     placeholder="Tu nombre…" autocomplete="off" />
              <button id="save-record-btn" class="btn-primary">Guardar</button>
            </div>
          </div>
          <div id="records-gameover" class="records-container"></div>
          <div class="overlay-actions">
            <button id="restart-btn" class="btn-primary">Reiniciar</button>
            <button id="reset-btn-gameover" class="btn-reset">Borrar récords</button>
          </div>
        </div>

        <!-- Pantalla de pausa -->
        <div id="screen-pause" class="screen hidden">
          <p class="screen-title title-blue">PAUSA</p>

          <div id="pause-main">
            <button id="resume-btn" class="menu-btn">Reanudar</button>
            <button id="pause-restart-btn" class="menu-btn">Reiniciar</button>
            <button id="controls-btn" class="menu-btn">Ver controles</button>
            <div class="level-row">
              <span class="level-label">Nivel inicial</span>
              <div class="level-stepper">
                <button id="level-dec" class="level-step">−</button>
                <span id="level-display">1</span>
                <button id="level-inc" class="level-step">+</button>
              </div>
            </div>
          </div>

          <div id="controls-view" class="hidden">
            <ul class="menu-controls-list">
              <li><kbd>←</kbd><kbd>→</kbd> mover</li>
              <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
              <li><kbd>↓</kbd> bajar</li>
              <li><kbd>Space</kbd> caída rápida</li>
              <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
            </ul>
            <button id="back-btn" class="menu-btn">Volver</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
